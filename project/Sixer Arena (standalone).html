document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 solid #34321f\">◉ Directions<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"padding:8px 20px 0\">\n            <button onclick=\"{{ goBookings }}\" style=\"width:100%;height:54px;border-radius:15px;background:#FFD400;color:#14130E;font-size:15px;font-weight:900\">View my bookings<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===== MY BOOKINGS ===== -->\n      <sc-if value=\"{{ isBookings }}\" hint-placeholder-val=\"{{ false }}\">\n        <div class=\"sx-scroll\" style=\"flex:1;overflow-y:auto;padding-bottom:100px\">\n          <div style=\"padding:56px 22px 14px\"><div style=\"font-family:Anton;font-size:28px;color:#14130E\">My bookings<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;gap:8px;padding:0 22px 14px\">\n            <button onclick=\"{{ setUpcoming }}\" style=\"{{ tabUpStyle }}\">Upcoming<\u002Fbutton>\n            <button onclick=\"{{ setPast }}\" style=\"{{ tabPastStyle }}\">Past<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"padding:0 18px;display:flex;flex-direction:column;gap:11px\">\n            <sc-for list=\"{{ bookingRows }}\" as=\"b\" hint-placeholder-count=\"2\">\n              <button onclick=\"{{ b.onTap }}\" style=\"display:flex;align-items:center;gap:13px;background:#fff;border:1px solid #E6E6DE;border-radius:16px;padding:14px 15px;text-align:left\">\n                <div style=\"width:46px;height:46px;border-radius:13px;background:#14130E;display:flex;align-items:center;justify-content:center;font-size:22px\">{{ b.icon }}<\u002Fdiv>\n                <div style=\"flex:1\">\n                  <div style=\"font-size:14.5px;font-weight:800;color:#14130E\">{{ b.title }}<\u002Fdiv>\n                  <div style=\"font-size:11.5px;color:#6C6C61;margin-top:2px\">{{ b.subtitle }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"text-align:right\">\n                  <div style=\"font-size:14px;font-weight:800;color:#14130E;font-variant-numeric:tabular-nums\">{{ b.priceStr }}<\u002Fdiv>\n                  <div style=\"{{ b.chipStyle }}\">{{ b.status }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n            <sc-if value=\"{{ bookingsEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"text-align:center;padding:50px 20px\">\n                <div style=\"font-size:44px\">🥅<\u002Fdiv>\n                <div style=\"font-family:Anton;font-size:20px;color:#14130E;margin-top:10px\">Nothing here yet<\u002Fdiv>\n                <div style=\"font-size:12.5px;color:#6C6C61;margin-top:4px\">Your booked slots will show up here.<\u002Fdiv>\n                <button onclick=\"{{ goHome }}\" style=\"margin-top:16px;height:46px;padding:0 22px;border-radius:13px;background:#FFD400;color:#14130E;font-size:14px;font-weight:800\">Grab a ground →<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===== BOOKING DETAIL ===== -->\n      <sc-if value=\"{{ isDetail }}\" hint-placeholder-val=\"{{ false }}\">\n        <div class=\"sx-scroll\" style=\"flex:1;overflow-y:auto;background:#F4F4EE;padding-bottom:30px\">\n          <div style=\"background:linear-gradient(160deg,#201E14,#14130E);padding:56px 22px 24px;border-radius:0 0 24px 24px\">\n            <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:18px\">\n              <button onclick=\"{{ goBookings }}\" style=\"width:40px;height:40px;border-radius:12px;background:#201E15;border:1px solid #34321f;font-size:18px;color:#fff\">←<\u002Fbutton>\n              <div style=\"{{ detailChipStyle }}\">{{ detailStatus }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font-size:28px\">{{ detailIcon }}<\u002Fdiv>\n            <div style=\"font-family:Anton;font-size:30px;color:#fff;margin-top:6px;line-height:1.02\">{{ detailTitle }}<\u002Fdiv>\n            <div style=\"font-size:13px;color:#9a988a;margin-top:6px\">{{ detailSubtitle }}<\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- entry code -->\n          <sc-if value=\"{{ detailUpcoming }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"margin:16px 20px 0;background:#14130E;border-radius:18px;padding:20px;display:flex;align-items:center;gap:18px\">\n              <div style=\"width:96px;height:96px;border-radius:12px;background:#fff;padding:8px;display:grid;grid-template-columns:repeat(7,1fr);grid-template-rows:repeat(7,1fr);gap:2px\">\n                <sc-for list=\"{{ qrCells }}\" as=\"q\" hint-placeholder-count=\"49\">\n                  <div style=\"{{ q.style }}\"><\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div>\n                <div style=\"font-size:11px;font-weight:700;color:#FFD400;letter-spacing:.5px;text-transform:uppercase\">Gate entry code<\u002Fdiv>\n                <div style=\"font-family:Anton;font-size:30px;color:#fff;letter-spacing:3px;margin-top:4px\">{{ lastCodeShort }}<\u002Fdiv>\n                <div style=\"font-size:11px;color:#9a988a;margin-top:4px\">Show at the gate to enter.<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <div style=\"margin:16px 20px 0;background:#fff;border:1px solid #E6E6DE;border-radius:16px;padding:15px\">\n            <div style=\"display:flex;justify-content:space-between;font-size:13px;color:#6C6C61;margin-bottom:9px\"><span>Turf<\u002Fspan><span style=\"font-weight:700;color:#14130E\">Sixer Arena · Kalyanpur<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;justify-content:space-between;font-size:13px;color:#6C6C61;margin-bottom:9px\"><span>Court<\u002Fspan><span style=\"font-weight:700;color:#14130E\">{{ detailCourt }}<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;justify-content:space-between;font-size:13px;color:#6C6C61;padding-top:9px;border-top:1px dashed #E6E6DE\"><span>Amount paid<\u002Fspan><span style=\"font-weight:800;color:#14130E;font-variant-numeric:tabular-nums\">{{ detailTotalStr }}<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"padding:16px 20px 0;display:flex;flex-direction:column;gap:9px\">\n            <sc-if value=\"{{ detailUpcoming }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"display:flex;gap:9px\">\n                <button style=\"flex:1;height:50px;border-radius:14px;background:#14130E;color:#fff;font-size:13.5px;font-weight:800\">↻ Reschedule<\u002Fbutton>\n                <button onclick=\"{{ cancelBooking }}\" style=\"flex:1;height:50px;border-radius:14px;background:#FCE9E5;color:#E5533C;font-size:13.5px;font-weight:800;border:1px solid #F4C9BF\">Cancel booking<\u002Fbutton>\n              <\u002Fdiv>\n              <div style=\"font-size:11px;color:#6C6C61;text-align:center\">Free cancellation up to 6 hrs before · 50% refund after.<\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ detailRebook }}\" hint-placeholder-val=\"{{ false }}\">\n              <button onclick=\"{{ goHome }}\" style=\"height:52px;border-radius:14px;background:#FFD400;color:#14130E;font-size:14.5px;font-weight:900\">Rebook this slot<\u002Fbutton>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===== PROFILE ===== -->\n      <sc-if value=\"{{ isProfile }}\" hint-placeholder-val=\"{{ false }}\">\n        <div class=\"sx-scroll\" style=\"flex:1;overflow-y:auto;padding-bottom:100px\">\n          <div style=\"background:linear-gradient(160deg,#201E14,#14130E);padding:60px 22px 26px;border-radius:0 0 24px 24px;display:flex;align-items:center;gap:15px\">\n            <div style=\"width:64px;height:64px;border-radius:20px;background:#FFD400;display:flex;align-items:center;justify-content:center;font-family:Anton;font-size:30px;color:#14130E\">{{ initial }}<\u002Fdiv>\n            <div><div style=\"font-family:Anton;font-size:24px;color:#fff\">{{ nameOrGuest }}<\u002Fdiv><div style=\"font-size:12.5px;color:#9a988a\">+91 {{ phoneStr }}<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:16px 20px 0;display:flex;flex-direction:column;gap:10px\">\n            <div style=\"background:#fff;border:1px solid #E6E6DE;border-radius:16px;overflow:hidden\">\n              <sc-for list=\"{{ profileRows }}\" as=\"r\" hint-placeholder-count=\"4\">\n                <div style=\"display:flex;align-items:center;gap:13px;padding:15px 16px;border-bottom:1px solid #F0F0EA\"><span style=\"font-size:19px;width:24px\">{{ r.icon }}<\u002Fspan><span style=\"flex:1;font-size:14px;font-weight:600;color:#14130E\">{{ r.label }}<\u002Fspan><span style=\"color:#B8B8AE;font-size:16px\">›<\u002Fspan><\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <button onclick=\"{{ logout }}\" style=\"height:52px;border-radius:15px;background:#fff;border:1px solid #E6E6DE;color:#E5533C;font-size:14px;font-weight:800\">Log out<\u002Fbutton>\n            <div style=\"text-align:center;font-size:11px;color:#B8B8AE;margin-top:4px\">Sixer Arena · v1.0<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===== BOTTOM NAV ===== -->\n      <sc-if value=\"{{ showNav }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:absolute;left:0;right:0;bottom:0;z-index:35;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-top:1px solid #E6E6DE;padding:9px 26px 24px;display:flex;justify-content:space-between\">\n          <sc-for list=\"{{ navItems }}\" as=\"n\" hint-placeholder-count=\"3\">\n            <button onclick=\"{{ n.onTap }}\" style=\"display:flex;flex-direction:column;align-items:center;gap:3px;background:none;flex:1\">\n              <span style=\"{{ n.iconStyle }}\">{{ n.icon }}<\u002Fspan>\n              <span style=\"{{ n.labelStyle }}\">{{ n.label }}<\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===== TOAST ===== -->\n      <sc-if value=\"{{ hasToast }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:absolute;left:20px;right:20px;top:56px;z-index:70;animation:sxrise .25s ease both\">\n          <div style=\"display:flex;align-items:center;gap:10px;background:#14130E;border-radius:14px;padding:13px 16px;box-shadow:0 16px 30px -12px rgba(0,0,0,.5)\">\n            <span style=\"width:8px;height:8px;border-radius:50%;background:#FFD400\"><\u002Fspan>\n            <span style=\"font-size:13px;font-weight:700;color:#fff\">{{ toast }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    screen: 'splash', tab: 'home', bTab: 'upcoming',\n    sportId: 'cricket', dateIdx: 0, cart: [],\n    phone: '', otp: '', name: '', team: '', pay: 'upi',\n    loginStep: 'phone', lastCode: null, lastBooking: null,\n    activeId: null, toast: null,\n    bookings: [\n      { id:'seed1', code:'SX7731', past:true, status:'Completed', court:'Turf A', total:1540,\n        slots:[{icon:'⚽',title:'Football · 5-a-side',subtitle:'Sat 28 Jun · 9 – 10 PM · Turf A',priceStr:'₹1,540'}] },\n      { id:'seed2', code:'SX7702', past:true, status:'Completed', court:'Turf B', total:1215,\n        slots:[{icon:'🏏',title:'Box Cricket · 6-a-side',subtitle:'Sun 22 Jun · 7 – 8 PM · Turf B',priceStr:'₹1,215'}] },\n    ],\n  };\n\n  sports = [\n    { id:'cricket', name:'Box Cricket', sub:'6-a-side', from:900, icon:'🏏', court:'Turf A' },\n    { id:'football', name:'Football', sub:'5-a-side', from:1100, icon:'⚽', court:'Turf A' },\n    { id:'pickle', name:'Pickleball', sub:'court', from:600, icon:'🎾', court:'Court 1' },\n    { id:'playzone', name:'Playzone', sub:'kids · turf', from:400, icon:'🎯', court:'Zone' },\n  ];\n\n  componentDidMount(){ this._t = setTimeout(()=>this.setState({screen:'login'}), 1300); }\n  componentWillUnmount(){ clearTimeout(this._t); }\n\n  money(n){ return '₹' + n.toLocaleString('en-IN'); }\n  h12(h){ let p=((h%24)+24)%24; let ap=p<12?'AM':'PM'; let hr=p%12; if(hr===0)hr=12; return {hr,ap}; }\n  slotLabel(h){ const a=this.h12(h), b=this.h12(h+1);\n    return a.ap===b.ap ? `${a.hr} – ${b.hr} ${b.ap}` : `${a.hr}${a.ap} – ${b.hr}${b.ap}`; }\n\n  dates(){\n    const dow=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'], mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];\n    const out=[]; const base=new Date();\n    for(let i=0;i<7;i++){ const d=new Date(base); d.setDate(base.getDate()+i);\n      out.push({ idx:i, dow: i===0?'Today':dow[d.getDay()], num:d.getDate(), mo:mo[d.getMonth()], weekend:d.getDay()===0||d.getDay()===6 }); }\n    return out;\n  }\n  slotState(dIdx, h, sportIdx, weekend){\n    const peak = (h>=17&&h<=21) || (weekend && h>=15 && h<=21);\n    const seed = (dIdx*13 + h*7 + sportIdx*5);\n    const full = (seed%9===0) || (peak && (dIdx+h+sportIdx)%6===0);\n    return { peak, full };\n  }\n  slotPrice(from, peak){ const p = peak ? from*1.35 : from; return Math.round(p/10)*10; }\n\n  toast(msg){ this.setState({toast:msg}); clearTimeout(this._toast); this._toast=setTimeout(()=>this.setState({toast:null}),2200); }\n\n  toggleSlot(item){\n    const cart=[...this.state.cart]; const i=cart.findIndex(c=>c.key===item.key);\n    if(i>=0) cart.splice(i,1); else cart.push(item);\n    this.setState({cart});\n  }\n  removeCart(key){ this.setState({cart:this.state.cart.filter(c=>c.key!==key)}); }\n\n  pay(){\n    this.setState({screen:'paying'});\n    setTimeout(()=>{\n      const s=this.state; const dv=this.dates();\n      const code='SX'+Math.floor(1000+Math.random()*9000);\n      const slots=s.cart.map(c=>({icon:c.icon,title:`${c.sportName} · ${c.sub}`,subtitle:`${c.dateFull} · ${c.time} · ${c.court}`,priceStr:this.money(c.price)}));\n      const total=s.cart.reduce((a,c)=>a+c.price,0)+ (s.cart.length?30:0);\n      const booking={ id:code, code, past:false, status:'Confirmed', court:s.cart[0]?.court||'Turf A', total, slots };\n      this.setState({ screen:'confirm', lastCode:code, lastBooking:booking, cart:[],\n        bookings:[booking, ...s.bookings] });\n    }, 1600);\n  }\n  cancel(){\n    const bookings=this.state.bookings.map(b=> b.id===this.state.activeId ? {...b,status:'Cancelled',past:true} : b);\n    this.setState({bookings, screen:'app', tab:'bookings', bTab:'upcoming'});\n    this.toast('Booking cancelled · refund initiated');\n  }\n\n  renderVals(){\n    const s=this.state, self=this;\n    const scr=s.screen;\n    const sport=this.sports.find(x=>x.id===s.sportId)||this.sports[0];\n    const sportIdx=this.sports.findIndex(x=>x.id===s.sportId);\n    const dv=this.dates(); const day=dv[s.dateIdx]||dv[0];\n\n    // login pad\n    const activeField = s.loginStep==='name' ? 'name' : (s.loginStep==='otp' ? 'otp' : 'phone');\n    const pushDigit=(d)=>{ if(activeField==='phone'){ this.setState(st=> st.phone.length<10 ? {phone:st.phone+d} : null); }\n      else if(activeField==='otp'){ this.setState(st=> st.otp.length<4 ? {otp:st.otp+d} : null); } };\n    const backspace=()=>{ if(activeField==='phone') this.setState(st=>({phone:st.phone.slice(0,-1)}));\n      else if(activeField==='otp') this.setState(st=>({otp:st.otp.slice(0,-1)})); };\n    const padKeys=['1','2','3','4','5','6','7','8','9','','0','⌫'].map((label,i)=>({\n      label, style:{height:'52px',borderRadius:'14px',fontFamily:'Archivo',fontSize:'22px',fontWeight:800,\n        color: label===''?'transparent':'#fff', background: label===''?'transparent':'#201E15',\n        border: label===''?'none':'1px solid #2c2a1c'},\n      onTap: label===''?()=>{}:(label==='⌫'?backspace:()=>pushDigit(label)),\n    }));\n\n    const loginNext=()=>{\n      if(s.loginStep==='phone'){ if(s.phone.length>=10) this.setState({loginStep:'otp'}); else this.toast('Enter a 10-digit number'); }\n      else if(s.loginStep==='otp'){ if(s.otp.length>=4) this.setState({loginStep: s.name?'done':'name'}, ()=>{ if(s.name) this.setState({screen:'app',tab:'home'}); }); else this.toast('Enter the 4-digit code'); }\n      else if(s.loginStep==='name'){ if((s.name||'').trim()) this.setState({screen:'app',tab:'home'}); else this.toast('Add your name'); }\n    };\n    const otpBoxes=[0,1,2,3].map(i=>({ ch:s.otp[i]||'', style:{flex:1,height:'62px',borderRadius:'15px',display:'flex',alignItems:'center',justifyContent:'center',\n      fontFamily:'Anton',fontSize:'26px',color:'#fff', background:'#201E15', border: (s.otp.length===i)?'1.5px solid #FFD400':'1.5px solid #34321f'} }));\n\n    // sports view\n    const sportsView=this.sports.map(sp=>{ const sel=sp.id===s.sportId;\n      return { icon:sp.icon, name:sp.name, sub:sp.sub, fromStr:'from '+this.money(sp.from),\n        onTap:()=>this.setState({sportId:sp.id}),\n        style:{flex:'0 0 auto',width:'152px',minHeight:'104px',display:'flex',flexDirection:'column',alignItems:'flex-start',gap:'1px',padding:'13px 15px',borderRadius:'16px',textAlign:'left',\n          background: sel?'#14130E':'#fff', border: sel?'1px solid #14130E':'1px solid #E6E6DE',\n          boxShadow: sel?'0 12px 22px -12px rgba(20,19,14,.5)':'none'},\n        nameStyle:{fontSize:'13.5px',fontWeight:800,marginTop:'6px',whiteSpace:'nowrap',color: sel?'#fff':'#14130E'},\n        subStyle:{fontSize:'11px',fontWeight:600,whiteSpace:'nowrap',color: sel?'#FFD400':'#6C6C61'},\n        priceStyle:{fontSize:'11px',fontWeight:700,marginTop:'3px',whiteSpace:'nowrap',color:'#9a988a'} };\n    });\n\n    // dates view\n    const datesView=dv.map(d=>{ const sel=d.idx===s.dateIdx;\n      return { dow:d.dow, num:String(d.num), mo:d.mo, onTap:()=>this.setState({dateIdx:d.idx}),\n        style:{flex:'0 0 auto',width:'58px',display:'flex',flexDirection:'column',alignItems:'center',gap:'2px',padding:'11px 0',borderRadius:'15px',\n          background: sel?'#14130E':'#fff', border: sel?'1px solid #14130E':'1px solid #E6E6DE'},\n        dowStyle:{fontSize:'10.5px',fontWeight:700,color: sel?'#FFD400':'#6C6C61'},\n        numStyle:{fontFamily:'Anton',fontSize:'20px',color: sel?'#fff':'#14130E'},\n        moStyle:{fontSize:'10px',fontWeight:600,color: sel?'#9a988a':'#9a988a'} };\n    });\n\n    // slots view\n    const dateFull=`${day.dow==='Today'?'Today':day.dow} ${day.num} ${day.mo}`;\n    const slotsView=[]; \n    for(let h=6; h<=23; h++){\n      const st=this.slotState(s.dateIdx,h,sportIdx,day.weekend);\n      const price=this.slotPrice(sport.from, st.peak);\n      const key=`${s.sportId}|${s.dateIdx}|${h}`;\n      const sel=s.cart.some(c=>c.key===key);\n      let bg='#fff',border='1px solid #E6E6DE',color='#14130E',opacity=1,bar='#FFD400',badge='Open',\n          badgeBg='#FFF6C2',badgeColor='#8A7400';\n      if(st.peak){ bar='#FF5A2C'; badge='Peak'; badgeBg='#FFE6DD'; badgeColor='#C63C14'; }\n      if(st.full){ bg='#F1F1EC'; border='1px solid #E9E9E1'; color='#A8A89E'; opacity=.75; bar='#DDDDD4'; badge='Full'; badgeBg='#E9E9E1'; badgeColor='#A8A89E'; }\n      if(sel){ bg='#14130E'; border='1px solid #14130E'; color='#fff'; bar='#FFD400'; badge='Picked'; badgeBg='#FFD400'; badgeColor='#14130E'; }\n      slotsView.push({\n        time:this.slotLabel(h), priceStr:this.money(price), badge, disabled:st.full,\n        onTap: st.full?()=>{}:()=>this.toggleSlot({key,sportId:s.sportId,sportName:sport.name,sub:sport.sub,icon:sport.icon,court:sport.court,dateIdx:s.dateIdx,dateFull,time:this.slotLabel(h),price,peak:st.peak}),\n        style:{position:'relative',display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 12px 12px 18px',borderRadius:'13px',\n          background:bg,border,color,opacity,overflow:'hidden',minHeight:'62px',boxShadow: sel?'0 10px 20px -10px rgba(20,19,14,.5)':'none'},\n        barStyle:{position:'absolute',left:0,top:0,bottom:0,width:'4px',background:bar},\n        badgeStyle:{fontSize:'9.5px',fontWeight:800,letterSpacing:'.3px',textTransform:'uppercase',padding:'3px 7px',borderRadius:'7px',background:badgeBg,color:badgeColor},\n      });\n    }\n\n    // cart / bill\n    const cartView=s.cart.map(c=>({ icon:c.icon, title:`${c.sportName} · ${c.sub}`, subtitle:`${c.dateFull} · ${c.time}`,\n      priceStr:this.money(c.price), onRemove:()=>this.removeCart(c.key) }));\n    const subtotal=s.cart.reduce((a,c)=>a+c.price,0);\n    const fee=s.cart.length?30:0; const grand=subtotal+fee; const deposit=Math.round(grand*0.4/10)*10;\n    const cartCount=s.cart.length;\n    const cartCountStr=`${cartCount} slot${cartCount===1?'':'s'} selected`;\n\n    const payMethods=[{id:'upi',name:'UPI',icon:'🟣'},{id:'card',name:'Card',icon:'💳'},{id:'net',name:'Netbank',icon:'🏦'}].map(p=>{\n      const sel=p.id===s.pay;\n      return { name:p.name, icon:p.icon, onTap:()=>this.setState({pay:p.id}),\n        style:{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:'5px',padding:'13px 0',borderRadius:'14px',\n          background: sel?'#14130E':'#fff', border: sel?'1px solid #14130E':'1px solid #E6E6DE', color: sel?'#fff':'#14130E'} };\n    });\n\n    // bookings\n    const chip=(status)=>{ let bg='#FFF6C2',c='#8A7400'; \n      if(status==='Confirmed'){bg='#E4F7DC';c='#2F6B1E';} if(status==='Completed'){bg='#EEEEE8';c='#6C6C61';} if(status==='Cancelled'){bg='#FCE9E5';c='#E5533C';}\n      return {marginTop:'5px',fontSize:'10px',fontWeight:800,letterSpacing:'.3px',padding:'3px 8px',borderRadius:'8px',background:bg,color:c,display:'inline-block'}; };\n    const list=s.bookings.filter(b=> s.bTab==='upcoming' ? !b.past : b.past);\n    const bookingRows=list.map(b=>{ const first=b.slots[0]; const extra=b.slots.length>1?` · +${b.slots.length-1} more`:'';\n      return { icon:first.icon, title:first.title, subtitle:first.subtitle.replace(/ · [^·]+$/, extra? (' '+extra):''), priceStr:this.money(b.total),\n        status:b.status, chipStyle:chip(b.status), onTap:()=>this.setState({screen:'detail',activeId:b.id}) };\n    });\n\n    // detail\n    const active=s.bookings.find(b=>b.id===s.activeId)||s.lastBooking||s.bookings[0];\n    const detailUpcoming = active && !active.past && active.status!=='Cancelled';\n    const dchip=chip(active?active.status:'Confirmed'); \n    const detailChipStyle={...dchip,fontSize:'11px'};\n    const qrCells=Array.from({length:49}).map((_,i)=>{ const on=(i*7+3)%3!==0 && (i%5!==2); \n      const corner=(i<2||(i>=7&&i<9)||i===14||i===4||i===5||(i>=11&&i<13));\n      return {style:{background:(on||corner)?'#14130E':'#fff',borderRadius:'1px'}}; });\n\n    // profile\n    const profileRows=[{icon:'👥',label:'Saved teams'},{icon:'⭐',label:'Favourite turf'},{icon:'🧾',label:'Payment history'},{icon:'🔔',label:'Notifications'}];\n\n    // nav\n    const navDef=[{id:'home',icon:'⚡',label:'Book'},{id:'bookings',icon:'🎟️',label:'Bookings'},{id:'profile',icon:'👤',label:'Profile'}];\n    const navItems=navDef.map(n=>{ const sel=s.tab===n.id && scr==='app';\n      return { icon:n.icon, label:n.label,\n        onTap:()=>this.setState({screen:'app',tab:n.id}),\n        iconStyle:{fontSize:'19px',opacity: sel?1:.4, filter: sel?'none':'grayscale(1)'},\n        labelStyle:{fontSize:'10.5px',fontWeight:700,color: sel?'#14130E':'#B8B8AE'} };\n    });\n\n    const isApp = scr==='app';\n    return {\n      isSplash: scr==='splash', isLogin: scr==='login', isPaying: scr==='paying',\n      isCheckout: scr==='checkout', isConfirm: scr==='confirm', isDetail: scr==='detail',\n      isHome: isApp && s.tab==='home', isBookings: isApp && s.tab==='bookings', isProfile: isApp && s.tab==='profile',\n      showNav: isApp,\n\n      // login\n      loginTitle: s.loginStep==='phone'?'Enter your number' : s.loginStep==='otp'?'Verify OTP' : \"What's your name?\",\n      loginSub: s.loginStep==='phone'?'One tap and the ground is yours.' : s.loginStep==='otp'?`Sent to +91 ${s.phone}` : 'Almost there.',\n      loginIsPhone: s.loginStep==='phone', loginIsOtp: s.loginStep==='otp', loginIsName: s.loginStep==='name',\n      loginShowPad: s.loginStep!=='name',\n      loginBtn: s.loginStep==='phone'?'Send OTP' : s.loginStep==='otp'?'Verify & continue' : 'Start booking',\n      loginBtnStyle:{width:'100%',height:'56px',borderRadius:'15px',background:'#FFD400',color:'#14130E',fontSize:'16px',fontWeight:900},\n      onLoginNext: loginNext, padKeys, otpBoxes, onPhone:e=>this.setState({phone:(e.target.value||'').replace(/\\D/g,'').slice(0,10)}), onName:e=>this.setState({name:e.target.value}), onTeam:e=>this.setState({team:e.target.value}),\n      phone:s.phone, name:s.name, team:s.team,\n      phoneStr: s.phone||'98765 43210',\n\n      initial: (s.name||'G').trim().charAt(0).toUpperCase(),\n      nameOrGuest: s.name || 'Guest',\n\n      sportsView, datesView, slotsView,\n      hasCart: cartCount>0, cartCountStr, cartTotalStr:this.money(grand),\n      goCheckout:()=> cartCount>0 && this.setState({screen:'checkout'}),\n      goHome:()=>this.setState({screen:'app',tab:'home'}),\n      goProfile:()=>this.setState({screen:'app',tab:'profile'}),\n      goBookings:()=>this.setState({screen:'app',tab:'bookings',bTab:'upcoming'}),\n\n      cartView, subtotalStr:this.money(subtotal), feeStr:this.money(fee), grandTotalStr:this.money(grand), depositStr:this.money(deposit),\n      payMethods, payNow:()=>this.pay(),\n\n      lastCode:s.lastCode, lastCodeShort:s.lastCode? s.lastCode.replace('SX','') : '0000',\n      lastSlots: s.lastBooking? s.lastBooking.slots : [], lastTotalStr: s.lastBooking? this.money(s.lastBooking.total):'₹0',\n\n      setUpcoming:()=>this.setState({bTab:'upcoming'}), setPast:()=>this.setState({bTab:'past'}),\n      tabUpStyle: this._tab(s.bTab==='upcoming'), tabPastStyle:this._tab(s.bTab==='past'),\n      bookingRows, bookingsEmpty: bookingRows.length===0,\n\n      detailIcon: active? active.slots[0].icon:'⚽', detailTitle: active? active.slots[0].title:'',\n      detailSubtitle: active? active.slots[0].subtitle:'', detailCourt: active? active.court:'', detailTotalStr: active? this.money(active.total):'₹0',\n      detailStatus: active? active.status:'', detailChipStyle, detailUpcoming, detailRebook: active? active.past:false,\n      qrCells,\n      cancelBooking:()=>this.cancel(),\n\n      profileRows, logout:()=>this.setState({screen:'login',loginStep:'phone',phone:'',otp:'',name:''}),\n      navItems,\n      hasToast: !!s.toast, toast:s.toast,\n    };\n  }\n  _tab(active){ return {flex:1,height:'42px',borderRadius:'12px',fontSize:'13.5px',fontWeight:800,\n    background: active?'#14130E':'#fff', color: active?'#fff':'#6C6C61', border: active?'1px solid #14130E':'1px solid #E6E6DE'}; }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
